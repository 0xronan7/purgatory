name = "template-agnostic-server-cf-worker"
main = "src/worker.ts"
compatibility_date = "2023-08-14"

compatibility_flags = [ "nodejs_compat" ] # for node:async_hooks

[observability]
enabled = true
head_sampling_rate = 1 # optional. default = 1.

# D1 database for local development
[[d1_databases]]
binding = "DB"
database_name = "template-agnostic-db"
database_id = "local"

[env.production]
# Production database_id should be set via wrangler CLI or Cloudflare dashboard

[triggers]
crons = ["* * * * *", "*/1 * * * *", "*/2 * * * *"]
